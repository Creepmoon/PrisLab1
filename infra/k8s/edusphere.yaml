apiVersion: v1
kind: Namespace
metadata:
  name: edusphere
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: edusphere
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: edusphere/api-gateway:latest
          ports:
            - containerPort: 4000
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: edusphere
spec:
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 4000
